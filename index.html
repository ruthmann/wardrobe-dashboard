<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Footwear Collection — Stephen Alexander Ruthmann</title>
<style>
  :root{
    --color-background-primary:#ffffff;
    --color-background-secondary:#f5f4f2;
    --color-text-primary:#1a1a1a;
    --color-text-secondary:#6b6b6b;
    --color-text-tertiary:#9a9a96;
    --color-border-primary:#1a1a1a;
    --color-border-secondary:#bdbdbd;
    --color-border-tertiary:#e3e1dd;
    --border-radius-md:6px;
    --border-radius-lg:10px;
    --font-sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--color-background-secondary);color:var(--color-text-primary);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;}
  #root{max-width:1200px;margin:0 auto;padding:0 16px 60px;}
  input,select,textarea{font-family:inherit;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--color-border-secondary);}
  button{font-family:inherit;}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;}
  .tag{font-size:10px;padding:2px 7px;border-radius:10px;line-height:1.4;}
  img{max-width:100%;}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useMemo,useEffect,useRef}=React;

const STORAGE_KEY = "shoe_browser_v1_state";

// Maps an item id to its photo filename in assets/shoes/.
const IMAGE_MAP = {
  s_2:"Alden1031.jpeg", s_3:"Alden1340.jpeg", s_4:"Alden1473.jpeg", s_5:"Alden17831.jpeg",
  s_8:"Alden2210.jpeg", s_10:"Alden2451.jpeg", s_12:"Alden29364F.jpeg", s_13:"AldenJC40510H.jpeg",
  r_18:"Alden4060.jpeg", r_19:"Alden4074.jpeg", s_16:"Alden5165.jpeg", s_17:"Alden67540.jpeg",
  s_18:"Alden704L.jpeg", s_19:"Alden73921.jpeg", s_21:"Alden9431S.jpeg", s_22:"Alden9662F.jpeg",
  s_23:"Alden9750.jpeg", s_24:"AldenBB06603.jpeg", s_25:"AldenA0908H.jpeg", s_28:"AldenD2875HC.jpeg",
  s_29:"AldenD2941C.jpeg", s_new_6221f:"Alden6221L.jpeg", s_new_d6627c:"AldenD6627C.jpeg",
  s_114:"Alden96817.jpeg",
  s_113:"AldenD9622.jpeg", s_31:"AEMcAllister.jpeg", s_34:"BemerSidelace.jpeg",
  s_35:"BemerWholecut.jpeg", s_40:"CJKensingtonAlbert.jpeg", s_39:"CLPatentDerby.jpeg",
  s_42:"EGCranleigh.jpeg", s_43:"EGDoverAntiqueCalf.jpeg", s_45:"EGDoverLondonGrain.jpeg",
  s_44:"EGHalifax.jpeg", s_101:"FukudaDoubleMonk.jpeg", s_47:"GucciNavyLoafer.jpeg",
  s_48:"HackettCarminaLoafer.jpeg", s_49:"HanoverLongwing.jpeg", s_51:"HermesEspadrille.jpeg",

  s_56:"LobbGarnierII.jpeg", s_57:"LobbLopez.jpeg", s_58:"LobbPace.jpeg",
  s_64:"MargielaGAT.jpeg", s_73:"PCDeerskinSandal.jpeg", s_68:"ParabootSand.jpeg",
  s_72:"PealBBCJBurgundyBoot.jpeg", r_27:"RLAELongwing.jpeg", s_75:"RLCJCaptoe.jpeg",
  r_29:"RLDrivingLoafer.jpeg", s_77:"RLSantoniSuedeCaptoe.jpeg", r_28:"RRLCJLivingstoneIIBoots.jpeg",
  s_80:"RancourtRangerMocc.jpeg", s_109:"RuttRidley.jpeg", s_89:"SHMTOBlackChelsea.jpeg",
  s_new_ssdm:"SSDoubleMonk.jpeg", s_87:"SantoniHandmadeSplittoe.jpeg",
  s_88:"ScaforaSemiBrogueCaptoe.jpeg", s_90:"ShotoChelsea.jpeg",
  s_93:"TLB114.jpeg", s_94:"TLB121.jpeg", s_92:"TimberlandDOE.jpeg", s_95:"VansHorween.jpeg",
  s_100:"Viberg2030BlackCXLBoot.jpeg", s_98:"Viberg2030ChamoisRoughoutBoot.jpeg",
  s_99:"Viberg2030MaryamBoot.jpeg", s_112:"VibergSavoy.jpeg", s_104:"ZhouLvWholecut.jpeg",
  r_0:"AEBurgundyCalfLoafer.jpeg", r_3:"CJWinterGeorgeBoot.jpeg", r_5:"GrensonCaptoe.jpeg",
  r_6:"CheaneyWarwickCaptoe.jpeg", r_11:"TrickersSemiBrogueCaptoe.jpeg", r_16:"LobbShoreLoafer.jpeg",
  r_retired_s_78:"RRLTravelLoafer9D.jpeg",
};
function imgFor(item){ return item && IMAGE_MAP[item.id] ? "assets/shoes/"+IMAGE_MAP[item.id] : null; }

// Fallback swatch derived from the color name, for any item lacking an explicit swatch.
function deriveSwatch(color){
  const c=(color||"").toLowerCase();
  const table=[["color 8","#3a1414"],["ravello","#8B3A1F"],["cigar","#5C3A1F"],["whisk","#A05020"],
    ["burgundy","#5a2424"],["bordeaux","#5C2424"],["snuff","#B8826A"],["navy","#1F2848"],
    ["black","#1f1f1f"],["nero","#1f1f1f"],["ebon","#3F2A1B"],["cognac","#8B4520"],
    ["chestnut","#7C3A1F"],["mahogany","#5A2D1F"],["walnut","#7C5235"],["tobacco","#9A6238"],
    ["dark brown","#3F2A1B"],["espresso","#3F2818"],["medium brown","#7B5235"],["brown","#5C3825"],
    ["tan","#C09060"],["white","#F0EDE5"],["cream","#E5DCC8"],["ecru","#E5DCC8"],
    ["grey","#3a3a3c"],["gray","#3a3a3c"],["charcoal","#383838"],["blue","#2A3858"],
    ["natural","#A87850"],["amber","#7C4525"]];
  for(const [k,v] of table){ if(c.includes(k)) return v; }
  return "#888880";
}
function swOf(item){ return item.swatch || deriveSwatch(item.color); }

// ===== Field grouping helpers =====

const MATERIAL_GROUPS = {
  "Shell": (m,n)=>/shell/i.test(m),
  "Suede": (m,n)=>/suede|chamois|nubuck/i.test(m),
  "CXL/Pull-up": (m,n)=>/cxl|pull-up|pull up|crazy horse/i.test(m)||/cxl/i.test(n),
  "Patent": (m,n)=>/patent/i.test(m),
  "Horse leather": (m,n)=>/horse(?!\s+leather)|horsebutt|tampy|tamp|maryam/i.test(m)||/horse leather/i.test(m),
  "Vachetta": (m,n)=>/vachetta|vacchetta/i.test(m),
  "Calf": (m,n)=>/calf/i.test(m)&&!/cxl/i.test(m)&&!/grain/i.test(m)&&!/horse/i.test(m),
  "Grain": (m,n)=>/grain|pebble|hatch|london grain/i.test(m),
  "Exotic": (m,n)=>/ostrich|crocodile|alligator|exotic|kangaroo/i.test(m),
  "Canvas": (m,n)=>/canvas/i.test(m),
  "Synthetic": (m,n)=>/synthetic|mesh|fabric/i.test(m),
  "Other leather": (m,n)=>/leather|deerskin|buffalo|pelle|cowhide/i.test(m),
};

const FORMALITY_GROUPS = {
  "Formal": ["Formal","Statement Formal","Creative Formal"],
  "Smart Formal": ["Smart Formal"],
  "Smart Casual": ["Smart Casual","Refined Casual","Artisan Smart","Rugged Smart Casual"],
  "Business Casual": ["Business Casual"],
  "Casual": ["Casual","Creative Casual","Statement Casual","Artisan Casual","Rugged Casual","Artisan Avant-Garde"],
};

const TRADITION_TAGS = {
  "American": ["alden","ralph-lauren","viberg","red-wing","redwing","rancourt","hanover","timberland","allen-edmonds","allen edmonds","mayton","rrl","bed|stu","bed|stü","vans","oncloud","margiela","americana","east rock"],
  "British": ["john-lobb","john lobb","edward-green","edward green","peal","crockett","hackett","grenson","kensington","cheaney","tricker","löf","loef","trickers"],
  "Continental": ["paraboot","santoni","carmina","carpe-diem","carpe diem","meccariello","scafora","fukuda","tlb","vass","bemer","heschung","loro-piana","loro piana","baudoin","quadratura","christian-louboutin","louboutin","gucci","leeward","zegna","hermès","hermes","lemargo","bestetti","stefano-bemer","yohei-fukuda","chiappini","shoto","lucchese","luchesse","suitsupply","chambeliss","massimo dutti","massimo","dinkelacker","academy of love"],
  "Asian": ["zhou-lv","zhou lv","拙履","mr-zhao","mr. zhao","shanghai","feiyue","doek","hender-scheme","hender","jueshi","yohji","yohji-yamamoto","yamamoto","scheme","ruttshoes","rutt","clot"],
};

function getMaterialGroup(m,n){
  for(const [g,test] of Object.entries(MATERIAL_GROUPS)){ if(test(m||"",n||"")) return g; }
  return "Other";
}
function getFormalityGroup(f){
  for(const [g,list] of Object.entries(FORMALITY_GROUPS)){ if(list.includes(f)) return g; }
  return "Casual";
}
function getTradition(item){
  const search=(item.brand+" "+(item.tags||[]).join(" ")+" "+item.name).toLowerCase();
  for(const t of ["Asian","British","American","Continental"]){
    if(TRADITION_TAGS[t].some(m=>search.includes(m))) return t;
  }
  return "Other";
}
function getColorLane(item){
  const c=(item.color||"").toLowerCase();
  const tags=(item.tags||[]).map(t=>t.toLowerCase());
  if(c.includes("color 8")) return "Color 8";
  if(tags.includes("color 8")||tags.includes("color-8")) return "Color 8";
  if(c.includes("ravello")) return "Ravello";
  if(c.includes("cigar")) return "Cigar";
  if(c.includes("color 4")) return "Color 4";
  if(c.includes("color 2")) return "Color 2";
  if(c.includes("whisk")) return "Whisky";
  if(c.includes("natural")&&c.includes("reverse")) return "Natural reverse";
  if(c.includes("burgundy")||c.includes("bordeaux")||tags.includes("burgundy")) return "Burgundy";
  if(c.includes("snuff")) return "Snuff";
  // hard color families first (so e.g. "White - natural" stays white)
  if(c.includes("black")||c.includes("ebon")||c.includes("nero")) return "Black";
  if(c.includes("navy")||c.includes("blue")||c.includes("cobalt")) return "Blue/Navy";
  if(c.includes("grey")||c.includes("gray")||c.includes("charcoal")) return "Grey/Charcoal";
  if(c.includes("white")||c.includes("ecru")||c.includes("ivory")||c.includes("cream")) return "White/Ecru";
  // brown / tan family
  if(c.includes("espresso")||c.includes("dark chocolate")||c.includes("dark brown")) return "Dark brown";
  if(c.includes("medium brown")||c.includes("mid-brown")) return "Medium brown";
  if(c.includes("walnut")) return "Walnut";
  if(c.includes("mahogany")) return "Mahogany";
  if(c.includes("tobacco")||c.includes("noix")) return "Tobacco/Noix";
  if(c.includes("oak")) return "Oak";
  if(c.includes("clay")||c.includes("brick")||c.includes("rust")||c.includes("reddish")||c.includes("russet")) return "Russet/Red";
  if(c.includes("cognac")||c.includes("chestnut")) return "Cognac/Chestnut";
  if(c.includes("teak")||c.includes("rye")||c.includes("oro")||c.includes("amber")) return "Warm patinated";
  if(c.includes("natural")||c.includes("raw")||c.includes("undyed")||c.includes("veg tan")) return "Natural";
  if(c.includes("tan")||c.includes("gold")||c.includes("caramel")||c.includes("camel")||c.includes("wheat")||c.includes("sand")||c.includes("beige")) return "Tan";
  if(c.includes("greige")||c.includes("taupe")||c.includes("stone")||c.includes("mushroom")) return "Greige/Taupe";
  if(c.includes("brown")) return "Brown";
  return "Other";
}

// ===== Tag styling =====

function MaterialTag({material,name}){
  const g=getMaterialGroup(material,name);
  const styles={
    "Shell":{bg:"#FCEBEB",color:"#791F1F"}, "Suede":{bg:"#FAECE7",color:"#712B13"},
    "CXL/Pull-up":{bg:"#FAEEDA",color:"#633806"}, "Calf":{bg:"#F1EFE8",color:"#444441"},
    "Grain":{bg:"#EAF3DE",color:"#27500A"}, "Patent":{bg:"#252830",color:"#FFFFFF"},
    "Horse leather":{bg:"#F4C0D1",color:"#72243E"}, "Vachetta":{bg:"#FAEEDA",color:"#854F0B"},
    "Exotic":{bg:"#FBEAF0",color:"#72243E"}, "Canvas":{bg:"#EEEDFE",color:"#3C3489"},
    "Synthetic":{bg:"#E1F5EE",color:"#085041"}, "Other leather":{bg:"#F1EFE8",color:"#5F5E5A"},
    "Other":{bg:"#F1EFE8",color:"#5F5E5A"},
  };
  const s=styles[g]||styles.Other;
  return <span className="tag" style={{background:s.bg,color:s.color}}>{g.toLowerCase()}</span>;
}
function FormalityTag({formality}){
  const g=getFormalityGroup(formality);
  const styles={
    "Formal":{bg:"#E6F1FB",color:"#0C447C"}, "Smart Formal":{bg:"#E6F1FB",color:"#185FA5"},
    "Smart Casual":{bg:"#EEEDFE",color:"#3C3489"}, "Business Casual":{bg:"#E1F5EE",color:"#0F6E56"},
    "Casual":{bg:"#F1EFE8",color:"#5F5E5A"},
  };
  const s=styles[g]||styles.Casual;
  return <span className="tag" style={{background:s.bg,color:s.color}}>{g.toLowerCase()}</span>;
}
function StatusTag({status}){
  const styles={
    "Active":{bg:"#EAF3DE",color:"#3B6D11"}, "Repair":{bg:"#FCEBEB",color:"#A32D2D"},
    "En Route":{bg:"#FAEEDA",color:"#BA7517"}, "Wishlist":{bg:"#EEEDFE",color:"#534AB7"},
    "Maybe":{bg:"#FCF4D9",color:"#866A00"}, "Retired":{bg:"#F1EFE8",color:"#5F5E5A"},
  };
  const s=styles[status]||styles.Active;
  return <span className="tag" style={{background:s.bg,color:s.color}}>{(status||"").toLowerCase()}</span>;
}
function TraditionTag({tradition}){
  return <span className="tag" style={{background:"#E1F5EE",color:"#085041",fontWeight:500}}>{tradition.toLowerCase()}</span>;
}
function LaneTag({lane}){
  return <span className="tag" style={{background:"#F1EFE8",color:"#2C2C2A"}}>{lane.toLowerCase()}</span>;
}

// ===== Multi-select chip filter =====

function ChipFilter({label,options,selected,onChange}){
  return (
    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
      <span style={{fontSize:11,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.4px",marginRight:2,width:78,flexShrink:0}}>{label}</span>
      {options.map(opt=>{
        const active=selected.includes(opt);
        return (
          <span key={opt}
            onClick={()=>onChange(active?selected.filter(s=>s!==opt):[...selected,opt])}
            style={{
              fontSize:11, padding:"3px 10px", borderRadius:12,
              background:active?"#185FA5":"var(--color-background-primary)",
              color:active?"#FFFFFF":"var(--color-text-secondary)",
              border:active?"0.5px solid #185FA5":"0.5px solid var(--color-border-tertiary)",
              fontWeight:active?500:400, cursor:"pointer", userSelect:"none",
              boxShadow:active?"0 0 0 1px #185FA5":"none", transition:"background 0.1s, color 0.1s",
            }}>{opt.toLowerCase()}</span>
        );
      })}
    </div>
  );
}

// ===== Card =====

function ShoeCard({item,onClick}){
  const tradition=getTradition(item);
  const lane=getColorLane(item);
  const photo=imgFor(item);
  const lastSubmatch=(item.notes||"").match(/(Barrie|Plaza|Aberdeen|Hampton|Van|Copley|Grant|Leydon|Orleans|Trubalance|Picasso|Forest|Actem|Cantilever|Modified last|Form [A-Z]|F last|Last \d+|\d{3,4}x?\b)/i);
  const lastName=lastSubmatch?lastSubmatch[0]:null;
  const sizeMatch=(item.notes||"").match(/(\d+(?:\.5)?\s*(?:[A-Z]\/?[A-Z]?|EU\s*\d+|UK\s*\d+(?:\.5)?[A-Z]*|US\s*\d+(?:\.5)?[A-Z]?))/);
  const size=sizeMatch?sizeMatch[0]:null;

  return (
    <div onClick={onClick}
      style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",
        borderRadius:"var(--border-radius-lg)",padding:"12px 14px",display:"flex",gap:12,alignItems:"flex-start",cursor:"pointer"}}>
      <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0,alignItems:"center",paddingTop:2}}>
        {photo
          ? <img src={photo} alt={item.name} loading="lazy"
              style={{width:52,height:52,borderRadius:6,objectFit:"cover",border:"0.5px solid rgba(0,0,0,0.15)",background:swOf(item)}}/>
          : <div title={item.color}
              style={{width:42,height:42,borderRadius:6,background:swOf(item),border:"0.5px solid rgba(0,0,0,0.15)"}}/>}
        <span style={{fontSize:9,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.3px",textAlign:"center",lineHeight:1.2,maxWidth:54}}>
          {getMaterialGroup(item.material,item.name)}
        </span>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <p style={{fontSize:11,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.4px",margin:"0 0 1px"}}>
          {item.brand} · {item.id}
        </p>
        <p style={{fontSize:14,fontWeight:500,margin:"0 0 4px",lineHeight:1.3,wordBreak:"break-word"}}>
          {item.name.replace(/\s*\([^)]+\)\s*$/,"")}
        </p>
        <p style={{fontSize:11,color:"var(--color-text-secondary)",margin:"0 0 6px",lineHeight:1.4}}>
          <strong style={{fontWeight:500,color:"var(--color-text-primary)"}}>{item.color}</strong>
          {lastName?` · ${lastName}`:""}
          {size?` · ${size}`:""}
          {item.subcategory?` · ${item.subcategory.toLowerCase()}`:""}
        </p>
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
          <MaterialTag material={item.material} name={item.name}/>
          <LaneTag lane={lane}/>
          <FormalityTag formality={item.formality}/>
          <TraditionTag tradition={tradition}/>
          <StatusTag status={item.status}/>
        </div>
      </div>
    </div>
  );
}

// ===== Detail panel =====

function DetailPanel({item,onClose}){
  const [lightbox,setLightbox]=useState(false);
  if(!item) return null;
  const photo=imgFor(item);
  return (
    <div onClick={onClose}
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:1000,display:"flex",
        alignItems:"center",justifyContent:"center",padding:20}}>
      <div onClick={e=>e.stopPropagation()}
        style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-secondary)",
          borderRadius:"var(--border-radius-lg)",padding:24,maxWidth:560,width:"100%",maxHeight:"88vh",overflow:"auto"}}>
        <div style={{display:"flex",gap:16,alignItems:"flex-start",marginBottom:16}}>
          {photo
            ? <img src={photo} alt={item.name} onClick={()=>setLightbox(true)}
                style={{width:150,maxHeight:200,objectFit:"contain",borderRadius:8,border:"0.5px solid rgba(0,0,0,0.12)",
                  background:swOf(item),flexShrink:0,cursor:"zoom-in"}}/>
            : <div style={{width:80,height:80,borderRadius:8,background:swOf(item),border:"0.5px solid rgba(0,0,0,0.15)",flexShrink:0}}/>}
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:12,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.4px",margin:"0 0 2px"}}>{item.brand} · {item.id}</p>
            <h2 style={{fontSize:18,fontWeight:500,margin:"0 0 6px",lineHeight:1.3}}>{item.name}</h2>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              <StatusTag status={item.status}/>
              <FormalityTag formality={item.formality}/>
              <TraditionTag tradition={getTradition(item)}/>
            </div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"120px 1fr",gap:"8px 16px",fontSize:13,marginBottom:12}}>
          <span style={{color:"var(--color-text-secondary)"}}>Color</span><span>{item.color}</span>
          <span style={{color:"var(--color-text-secondary)"}}>Material</span><span>{item.material}</span>
          <span style={{color:"var(--color-text-secondary)"}}>Subcategory</span><span>{item.subcategory}</span>
          <span style={{color:"var(--color-text-secondary)"}}>Color lane</span><span>{getColorLane(item)}</span>
          <span style={{color:"var(--color-text-secondary)"}}>Season</span><span>{(item.season||[]).join(", ")}</span>
          {item.purchasePrice!=null && <><span style={{color:"var(--color-text-secondary)"}}>Price</span><span>{item.purchasePrice.toLocaleString()}{item.currency?" "+item.currency:""}</span></>}
          {item.origPrice && <><span style={{color:"var(--color-text-secondary)"}}>Orig. retail</span><span>{item.origPrice}</span></>}
          {item.acquiredFrom && <><span style={{color:"var(--color-text-secondary)"}}>Acquired from</span><span>{item.acquiredFrom}</span></>}
          {item.notes && <><span style={{color:"var(--color-text-secondary)"}}>Notes</span><span style={{lineHeight:1.5}}>{item.notes}</span></>}
          {item.tags && item.tags.length>0 && <><span style={{color:"var(--color-text-secondary)"}}>Tags</span><span>{item.tags.join(", ")}</span></>}
        </div>
        <button onClick={onClose}
          style={{background:"transparent",border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",
            padding:"6px 14px",fontSize:13,color:"var(--color-text-primary)",cursor:"pointer",fontFamily:"var(--font-sans)"}}>Close</button>
      </div>
      {lightbox && photo && (
        <div onClick={e=>{e.stopPropagation();setLightbox(false);}}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:1100,display:"flex",alignItems:"center",justifyContent:"center",padding:24,cursor:"zoom-out"}}>
          <img src={photo} alt={item.name} style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain",borderRadius:8}}/>
        </div>
      )}
    </div>
  );
}

// ===== Fullscreen carousel =====

function Carousel({items,index,onIndex,onClose}){
  const touchX=useRef(null);
  useEffect(()=>{
    function onKey(e){
      if(e.key==="Escape") onClose();
      else if(e.key==="ArrowRight") onIndex((index+1)%items.length);
      else if(e.key==="ArrowLeft") onIndex((index-1+items.length)%items.length);
    }
    window.addEventListener("keydown",onKey);
    return ()=>window.removeEventListener("keydown",onKey);
  },[index,items.length,onIndex,onClose]);
  const item=items[index];
  if(!item) return null;
  const photo=imgFor(item);
  const go=d=>onIndex((index+d+items.length)%items.length);
  const dim={color:"rgba(255,255,255,0.5)"};
  const arrow={position:"absolute",top:"50%",transform:"translateY(-50%)",zIndex:2,
    width:52,height:52,borderRadius:"50%",border:"none",cursor:"pointer",
    background:"rgba(255,255,255,0.12)",color:"#fff",fontSize:30,
    display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--font-sans)"};
  return (
    <div style={{position:"fixed",inset:0,background:"#0b0b0c",zIndex:1200,display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 18px",flexShrink:0}}>
        <span style={{letterSpacing:"0.12em",textTransform:"uppercase",fontSize:11,color:"rgba(255,255,255,0.7)"}}>Browsing · {index+1} / {items.length}</span>
        <button onClick={onClose} aria-label="Close"
          style={{background:"rgba(255,255,255,0.12)",border:"none",color:"#fff",width:36,height:36,borderRadius:"50%",cursor:"pointer",fontSize:20,fontFamily:"var(--font-sans)"}}>×</button>
      </div>
      <div style={{flex:1,position:"relative",minHeight:0,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 8px"}}
        onTouchStart={e=>{touchX.current=e.touches[0].clientX;}}
        onTouchEnd={e=>{if(touchX.current==null)return;const dx=e.changedTouches[0].clientX-touchX.current;if(Math.abs(dx)>40)go(dx<0?1:-1);touchX.current=null;}}>
        <button onClick={()=>go(-1)} aria-label="Previous" style={{...arrow,left:12}}>‹</button>
        {photo
          ? <img key={item.id} src={photo} alt={item.name}
              style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain",borderRadius:10,boxShadow:"0 8px 40px rgba(0,0,0,0.5)"}}/>
          : <div style={{width:"min(70vw,420px)",aspectRatio:"4 / 3",borderRadius:10,background:swOf(item),
              display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.85)",fontSize:13}}>No photo</div>}
        <button onClick={()=>go(1)} aria-label="Next" style={{...arrow,right:12}}>›</button>
      </div>
      <div style={{flexShrink:0,padding:"16px 20px 24px",color:"#fff",maxWidth:900,margin:"0 auto",width:"100%"}}>
        <div style={{fontSize:11,letterSpacing:"0.14em",textTransform:"uppercase",color:"rgba(255,255,255,0.55)",marginBottom:3}}>{item.brand} · {item.id}</div>
        <div style={{fontSize:20,fontWeight:600,marginBottom:10,lineHeight:1.25}}>{item.name}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:"6px 18px",fontSize:13,color:"rgba(255,255,255,0.85)"}}>
          {item.color && <span><span style={dim}>Color </span>{item.color}</span>}
          {item.material && <span><span style={dim}>Material </span>{item.material}</span>}
          {item.subcategory && <span><span style={dim}>Type </span>{item.subcategory}</span>}
          {(item.season||[]).length>0 && <span><span style={dim}>Season </span>{item.season.join(", ")}</span>}
          {item.purchasePrice!=null && <span><span style={dim}>Price </span>{item.purchasePrice.toLocaleString()}{item.currency?" "+item.currency:""}</span>}
          {item.origPrice && <span><span style={dim}>Retail </span>{item.origPrice}</span>}
          {item.acquiredFrom && <span><span style={dim}>From </span>{item.acquiredFrom}</span>}
        </div>
      </div>
    </div>
  );
}

// ===== Color spectrum sorting =====

function hexToHsl(hex){
  if(!hex||typeof hex!=="string") return {h:0,s:0,l:50};
  const cleaned=hex.replace("#","");
  if(cleaned.length!==6) return {h:0,s:0,l:50};
  const r=parseInt(cleaned.slice(0,2),16)/255;
  const g=parseInt(cleaned.slice(2,4),16)/255;
  const b=parseInt(cleaned.slice(4,6),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  const l=(max+min)/2;
  let h=0,s=0;
  if(max!==min){
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    if(max===r) h=((g-b)/d+(g<b?6:0));
    else if(max===g) h=(b-r)/d+2;
    else h=(r-g)/d+4;
    h*=60;
  }
  return {h,s:s*100,l:l*100};
}
function spectrumKey(item){
  const {h,s,l}=hexToHsl(swOf(item));
  if(s<8){
    if(l>92) return [0,0,-l];
    if(l>70) return [1,0,-l];
    if(l>35) return [11,0,-l];
    return [12,0,-l];
  }
  let bucket;
  if(h>=30&&h<60) bucket=2;
  else if(h>=5&&h<30) bucket=3;
  else if(h>=0&&h<5) bucket=5;
  else if(h>=340) bucket=5;
  else if(h>=300&&h<340) bucket=6;
  else if(h>=250&&h<300) bucket=9;
  else if(h>=200&&h<250) bucket=8;
  else if(h>=160&&h<200) bucket=7;
  else if(h>=80&&h<160) bucket=10;
  else bucket=13;
  return [bucket,-l,h];
}
function compareSpectrum(a,b){
  const ka=spectrumKey(a), kb=spectrumKey(b);
  for(let i=0;i<ka.length;i++){ if(ka[i]!==kb[i]) return ka[i]-kb[i]; }
  return a.name.localeCompare(b.name);
}

// Best-effort size parse → normalized to a US-ish scale so US/UK/EU/JP sort together.
function sizeValue(item){
  const txt=((item.notes||"")+" "+(item.name||"")).replace(/·/g," ");
  let m;
  if(m=txt.match(/EU\s*(\d{2}(?:\.5)?)/i)) return parseFloat(m[1])-33;
  if(m=txt.match(/UK\s*(\d{1,2}(?:\.5)?)/i)) return parseFloat(m[1])+1;
  if(m=txt.match(/US\s*(\d{1,2}(?:\.5)?)/i)) return parseFloat(m[1]);
  if(m=txt.match(/Size\s*(\d{1,2}(?:\.5)?)/i)){ const n=parseFloat(m[1]); return n>=24?n-18:n; }
  if(m=txt.match(/\b(\d{1,2}(?:\.5)?)\s*(?:[A-E]{1,3}|[A-E]\/[A-E])\b/)) return parseFloat(m[1]); // "10 B/D", "11D", "9EE"
  if(m=txt.match(/\b(4[0-7](?:\.5)?)\b/)) return parseFloat(m[1])-33;                   // bare EU range
  for(const mm of txt.matchAll(/\b(\d{1,2}(?:\.5)?)\b/g)){ const n=parseFloat(mm[1]); if(n>=6&&n<=13.5) return n; } // bare US size
  return null;
}

// ===== Main dashboard =====

const CLOTHING_TYPE=/shirt|knit|trouser|jacket|coat|tee|sweat|cardigan/i;

function normalizeRetired(r){
  return {
    ...r,
    category:"Footwear",
    subcategory:r.subcategory||r.type||"Other",
    status:"Retired",
    formality:r.formality||"Casual",
    season:r.season||["Year-round"],
    tags:r.tags||[],
  };
}

function ShoeBrowser(){
  const [items,setItems]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [loadError,setLoadError]=useState(null);

  const [query,setQuery]=useState("");
  const [statusFilter,setStatusFilter]=useState(["Active"]);
  const [materialFilter,setMaterialFilter]=useState([]);
  const [subcatFilter,setSubcatFilter]=useState([]);
  const [formalityFilter,setFormalityFilter]=useState([]);
  const [traditionFilter,setTraditionFilter]=useState([]);
  const [laneFilter,setLaneFilter]=useState([]);
  const [seasonFilter,setSeasonFilter]=useState([]);
  const [sortBy,setSortBy]=useState("spectrum");
  const [selected,setSelected]=useState(null);
  const [carouselIndex,setCarouselIndex]=useState(null);

  // Load collection data
  useEffect(()=>{
    (async()=>{
      try{
        const res=await fetch("data.json?v="+Date.now(),{cache:"no-store"});
        if(!res.ok) throw new Error("HTTP "+res.status);
        const seed=await res.json();
        const active=(seed.active||[]).filter(i=>i.category==="Footwear");
        const retired=(seed.retired||[])
          .filter(r=>!/_c_/.test(r.id||"") && !CLOTHING_TYPE.test(r.type||r.subcategory||""))
          .map(normalizeRetired);
        setItems([...active,...retired]);
      }catch(e){
        setLoadError("Could not load data.json. If you opened this file directly, serve it over http (e.g. a local server or GitHub Pages).");
      }finally{
        setLoaded(true);
      }
    })();
  },[]);

  // Restore saved filter state
  useEffect(()=>{
    try{
      const raw=localStorage.getItem(STORAGE_KEY);
      if(raw){
        const s=JSON.parse(raw);
        if(s.statusFilter) setStatusFilter(s.statusFilter);
        if(s.materialFilter) setMaterialFilter(s.materialFilter);
        if(s.subcatFilter) setSubcatFilter(s.subcatFilter);
        if(s.formalityFilter) setFormalityFilter(s.formalityFilter);
        if(s.traditionFilter) setTraditionFilter(s.traditionFilter);
        if(s.laneFilter) setLaneFilter(s.laneFilter);
        if(s.seasonFilter) setSeasonFilter(s.seasonFilter);
        if(s.sortBy) setSortBy(s.sortBy);
      }
    }catch(e){/* ignore */}
  },[]);

  // Persist filter state
  useEffect(()=>{
    if(!loaded) return;
    try{
      localStorage.setItem(STORAGE_KEY,JSON.stringify({
        statusFilter,materialFilter,subcatFilter,formalityFilter,traditionFilter,laneFilter,seasonFilter,sortBy,
      }));
    }catch(e){/* ignore */}
  },[loaded,statusFilter,materialFilter,subcatFilter,formalityFilter,traditionFilter,laneFilter,seasonFilter,sortBy]);

  const subcatOptions=useMemo(()=>[...new Set(items.map(i=>i.subcategory))].sort(),[items]);
  const laneOptions=useMemo(()=>[...new Set(items.map(getColorLane))].sort(),[items]);

  const seasonOptions=["Year-round","Spring","Summer","Fall","Winter"];
  const statusOptions=["Active","Maybe","Repair","En Route","Wishlist","Retired"];
  const materialOptions=["Shell","Suede","CXL/Pull-up","Calf","Grain","Patent","Horse leather","Vachetta","Exotic","Canvas","Synthetic","Other leather"];
  const formalityOptions=["Formal","Smart Formal","Smart Casual","Business Casual","Casual"];
  const traditionOptions=["American","British","Continental","Asian"];

  const filtered=useMemo(()=>{
    let list=items;
    if(statusFilter.length>0) list=list.filter(i=>statusFilter.includes(i.status));
    if(materialFilter.length>0) list=list.filter(i=>materialFilter.includes(getMaterialGroup(i.material,i.name)));
    if(subcatFilter.length>0) list=list.filter(i=>subcatFilter.includes(i.subcategory));
    if(formalityFilter.length>0) list=list.filter(i=>formalityFilter.includes(getFormalityGroup(i.formality)));
    if(traditionFilter.length>0) list=list.filter(i=>traditionFilter.includes(getTradition(i)));
    if(laneFilter.length>0) list=list.filter(i=>laneFilter.includes(getColorLane(i)));
    if(seasonFilter.length>0) list=list.filter(i=>(i.season||[]).some(s=>seasonFilter.includes(s)));
    if(query.trim()){
      const q=query.toLowerCase();
      list=list.filter(i=>(i.name+" "+i.brand+" "+i.color+" "+i.material+" "+(i.notes||"")+" "+(i.tags||[]).join(" ")).toLowerCase().includes(q));
    }
    const sorted=[...list];
    if(sortBy==="spectrum") sorted.sort(compareSpectrum);
    else if(sortBy==="brand") sorted.sort((a,b)=>a.brand.localeCompare(b.brand)||a.name.localeCompare(b.name));
    else if(sortBy==="color") sorted.sort((a,b)=>getColorLane(a).localeCompare(getColorLane(b))||a.name.localeCompare(b.name));
    else if(sortBy==="formality"){
      const order=["Formal","Smart Formal","Smart Casual","Business Casual","Casual"];
      sorted.sort((a,b)=>order.indexOf(getFormalityGroup(a.formality))-order.indexOf(getFormalityGroup(b.formality))||a.name.localeCompare(b.name));
    }
    else if(sortBy==="subcategory") sorted.sort((a,b)=>a.subcategory.localeCompare(b.subcategory)||a.name.localeCompare(b.name));
    else if(sortBy==="size") sorted.sort((a,b)=>{
      const sa=sizeValue(a), sb=sizeValue(b);
      if(sa==null&&sb==null) return a.name.localeCompare(b.name);
      if(sa==null) return 1;
      if(sb==null) return -1;
      return sa-sb || a.name.localeCompare(b.name);
    });
    else if(sortBy==="id") sorted.sort((a,b)=>a.id.localeCompare(b.id));
    return sorted;
  },[items,query,statusFilter,materialFilter,subcatFilter,formalityFilter,traditionFilter,laneFilter,seasonFilter,sortBy]);

  const clearFilters=()=>{
    setStatusFilter(["Active"]); setMaterialFilter([]); setSubcatFilter([]); setFormalityFilter([]);
    setTraditionFilter([]); setLaneFilter([]); setSeasonFilter([]); setQuery("");
  };

  const totalByStatus=useMemo(()=>{
    const c={}; items.forEach(i=>{c[i.status]=(c[i.status]||0)+1;}); return c;
  },[items]);

  return (
    <div style={{position:"relative",padding:"4px 0"}}>
      <div style={{padding:"20px 0 12px"}}>
        <div style={{fontSize:11,letterSpacing:"0.14em",textTransform:"uppercase",color:"var(--color-text-secondary)"}}>Footwear Collection</div>
        <div style={{fontSize:22,fontWeight:600,marginTop:2}}>Stephen Alexander Ruthmann</div>
      </div>

      {loadError && <div style={{padding:"14px 16px",background:"#FCEBEB",color:"#791F1F",borderRadius:"var(--border-radius-md)",fontSize:13,marginBottom:14}}>{loadError}</div>}
      {!loaded && !loadError && <div style={{padding:"40px 0",color:"var(--color-text-secondary)",fontSize:14}}>Loading collection…</div>}

      {loaded && !loadError && <>
      <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
        <input type="text" value={query} onChange={e=>setQuery(e.target.value)}
          placeholder="Search by brand, model, color, last, notes…"
          style={{flex:1,minWidth:200,padding:"8px 12px",border:"0.5px solid var(--color-border-tertiary)",
            borderRadius:"var(--border-radius-md)",fontSize:13,background:"var(--color-background-primary)",color:"var(--color-text-primary)"}}/>
        <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
          style={{padding:"8px 10px",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",
            fontSize:13,background:"var(--color-background-primary)",color:"var(--color-text-primary)"}}>
          <option value="spectrum">Sort: color spectrum (light → dark)</option>
          <option value="brand">Sort: brand</option>
          <option value="color">Sort: color lane</option>
          <option value="formality">Sort: formality</option>
          <option value="subcategory">Sort: subcategory</option>
          <option value="size">Sort: size (small → large)</option>
          <option value="id">Sort: id</option>
        </select>
        <button onClick={()=>setCarouselIndex(0)} disabled={filtered.length===0}
          style={{padding:"8px 14px",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",
            fontSize:13,background:"var(--color-text-primary)",color:"var(--color-background-primary)",
            cursor:filtered.length===0?"default":"pointer",opacity:filtered.length===0?0.4:1}}>⛶ Slideshow</button>
        <button onClick={clearFilters}
          style={{padding:"8px 12px",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",
            fontSize:13,background:"transparent",color:"var(--color-text-secondary)",cursor:"pointer"}}>Reset</button>
        <span style={{fontSize:12,color:"var(--color-text-secondary)",padding:"4px 10px",background:"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)"}}>
          {filtered.length} of {items.length}
        </span>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:8,padding:12,background:"var(--color-background-secondary)",
        borderRadius:"var(--border-radius-md)",marginBottom:14}}>
        <ChipFilter label="status" options={statusOptions} selected={statusFilter} onChange={setStatusFilter}/>
        <ChipFilter label="material" options={materialOptions} selected={materialFilter} onChange={setMaterialFilter}/>
        <ChipFilter label="type" options={subcatOptions} selected={subcatFilter} onChange={setSubcatFilter}/>
        <ChipFilter label="formality" options={formalityOptions} selected={formalityFilter} onChange={setFormalityFilter}/>
        <ChipFilter label="tradition" options={traditionOptions} selected={traditionFilter} onChange={setTraditionFilter}/>
        <ChipFilter label="color lane" options={laneOptions} selected={laneFilter} onChange={setLaneFilter}/>
        <ChipFilter label="season" options={seasonOptions} selected={seasonFilter} onChange={setSeasonFilter}/>
      </div>

      <div style={{display:"flex",gap:12,marginBottom:14,fontSize:12,color:"var(--color-text-secondary)",flexWrap:"wrap"}}>
        {statusOptions.map(s=>totalByStatus[s]!==undefined && (
          <span key={s} style={{display:"flex",alignItems:"center",gap:4}}><StatusTag status={s}/> {totalByStatus[s]||0}</span>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))",gap:10}}>
        {filtered.map(item=>(<ShoeCard key={item.id} item={item} onClick={()=>setSelected(item)}/>))}
      </div>

      {filtered.length===0 && (
        <div style={{textAlign:"center",padding:"40px 20px",color:"var(--color-text-secondary)",fontSize:14}}>
          No shoes match the current filters.<br/>
          <button onClick={clearFilters}
            style={{marginTop:12,padding:"6px 14px",border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",
              fontSize:13,background:"transparent",color:"var(--color-text-primary)",cursor:"pointer"}}>Reset filters</button>
        </div>
      )}
      </>}

      <DetailPanel item={selected} onClose={()=>setSelected(null)}/>
      {carouselIndex!=null && filtered.length>0 &&
        <Carousel items={filtered} index={Math.min(carouselIndex,filtered.length-1)}
          onIndex={setCarouselIndex} onClose={()=>setCarouselIndex(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ShoeBrowser/>);
</script>
</body>
</html>
